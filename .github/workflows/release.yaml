name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release-please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASES_GITHUB_TOKEN }}

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o yt-transcript-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/yt-transcript

      - name: Generate SHA-256 checksum
        run: sha256sum yt-transcript-${{ matrix.goos }}-${{ matrix.goarch }} > yt-transcript-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            yt-transcript-${{ matrix.goos }}-${{ matrix.goarch }} \
            yt-transcript-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
